name: Build Fixed Asset
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FAMS-Fixed-Assets-Management-System-
    env:
      IMAGE_NAME: kazeemakinrinde/fixed-assets:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and test with Maven
        run: |
          ./mvnw -B clean verify

      - name: Build and push Docker image with Jib
        run: |
          ./mvnw -B compile com.google.cloud.tools:jib-maven-plugin:build -Dimage=${{ env.IMAGE_NAME }}

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 15274145-d441-4d6d-8f0e-4f45993a2e5b
          RAILWAY_SERVICE_ID: fixed-assets
        run: |
          IMAGE_REF="kazeemakinrinde/fixed-assets:latest"
          echo "Updating service image to: $IMAGE_REF"
          curl -sSL "https://raw.githubusercontent.com/railwayapp/cli/master/install.sh" | sh
          export PATH="$HOME/.railway/bin:$PATH"
          railway login --apiKey "$RAILWAY_TOKEN"
          railway variables --set "RAILWAY_SERVICE_IMAGE=$IMAGE_REF" --service "$RAILWAY_SERVICE_ID"
