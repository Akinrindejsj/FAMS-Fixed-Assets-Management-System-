<!-- Confirm Delete Modal Fragment (Departments & Department Heads) -->
<!-- Include at body-root level (e.g. in the layout, alongside the logout modal)
     so the fixed-position overlay is not nested inside #main-content. -->
<div th:fragment="confirm-delete-modal">
    <div id="csConfirmModal" class="cs-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="csConfirmTitle">
        <div class="cs-modal" style="max-width: 28rem;">
            <div class="cs-modal-body" style="padding: 2rem; text-align: center;">
                <div style="width: 3rem; height: 3rem; border-radius: 9999px; background-color: #fef2f2; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                    <span class="material-symbols-outlined" style="color: #dc2626; font-size: 1.75rem;">warning</span>
                </div>
                <h3 id="csConfirmTitle" class="cs-modal-title" style="text-align: center; margin-bottom: 0.5rem; font-size: 1.125rem; font-weight: 600; color: #111827;">Confirm Deletion</h3>
                <p id="csConfirmText" style="font-size: 0.875rem; color: #6b7280; margin-bottom: 1.5rem; line-height: 1.5;"></p>
                <div style="display: flex; gap: 0.75rem; justify-content: center;">
                    <button type="button" class="cs-btn-secondary" onclick="csCloseConfirmModal()" style="min-width: 5rem;">Cancel</button>
                    <button type="button" class="cs-btn-primary" id="csConfirmBtn" onclick="csSubmitConfirmForm()" style="min-width: 5rem; background-color: #dc2626; border-color: #dc2626;">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden delete forms (submitted by the confirm modal) -->
    <form id="csDeleteDeptForm" method="POST" style="display:none;">
        <th:block th:if="${_csrf != null}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        </th:block>
    </form>
    <form id="csDeleteHeadForm" method="POST" style="display:none;">
        <th:block th:if="${_csrf != null}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        </th:block>
    </form>
</div>
